e<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<form class="form">

<h2>Inscription</h2>

<div class="input-box">
    <input type="text" id="nom" name="nom" required>
    <label for="nom">Nom complet</label>
</div>

<div class="input-box">
    <input type="email" id="email" name="email" required>
    <label for="email">Adresse email</label>
</div>

<div class="input-box">
    <input type="password" id="mdp" name="mdp" minlength="8" required>
    <label for="mdp">Mot de passe</label>
</div>

<div class="input-box">
    <input type="date" id="ddn" name="ddn" required>
    <label class="date-label">Date de naissance</label>
</div>

<div class="input-box">
    <input type="tel" id="tel" name="tel">
    <label for="tel">Téléphone</label>
</div>

<select id="niveau" name="niveau" required>
    <option value="">-- Niveau d'études --</option>
    <option value="bac">Bac</option>
    <option value="bac2">Bac+2</option>
    <option value="bac3">Bac+3</option>
    <option value="bac5">Bac+5 ou plus</option>
</select>

<div class="radio-group">
    <p>Comment as-tu connu l'événement ?</p>
    <label><input type="radio" name="source" required> Réseaux sociaux</label>
    <label><input type="radio" name="source"> Bouche à oreille</label>
    <label><input type="radio" name="source"> Email</label>
</div>

<textarea id="motivation" placeholder="Pourquoi tu t'inscris ?"></textarea>

<div class="checkbox">
    <label>
        <input type="checkbox" required>
        J'accepte les conditions d'utilisation
    </label>
</div>

<button type="submit">M'inscrire</button>

</form>

</div>

</body>
</html>
